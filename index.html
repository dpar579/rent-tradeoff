<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renting TradeOff</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>⚖️ Renting TradeOff</h1>

        <div class="section" id="step1-section">
            <h2>1. 나의 선호도 설정 (Weighting: 1~5)</h2>
            <div id="weighting-form">
            </div>
            <button onclick="goToStep2()" style="margin-top: 15px;">Next</button>
        </div>

        <div class="section" id="step2-section" style="display:none;">
            <h2>2. 매물 점수 입력 (Score: 1~5)</h2>
            <div class="input-group">
                <label>매물 이름/닉네임</label>
                <input type="text" id="prop-name" placeholder="예: 브리즈번 시티 아파트">
            </div>
            <div id="property-form">
            </div>
            <button onclick="analyzeProperty()">매물 평가 및 저장</button>
            <button onclick="goToStep1()" style="background: #95a5a6; margin-top: 10px;">이전 단계로 (선호도 설정)</button>
        </div>

        <div class="section result" id="result-section" style="display:none;">
            <h2>📊 매물 비교 랭킹</h2>
            <table id="ranking-table">
                <thead>
                    <tr>
                        <th>순위</th>
                        <th>매물명</th>
                        <th>총점</th>
                    </tr>
                </thead>
                <tbody id="ranking-body"></tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
